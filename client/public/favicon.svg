<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Origami crane on warm washi paper -->
  <rect width="64" height="64" rx="4" fill="#FAF7F2"/>
  <g fill="none" stroke="#C4523B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Diamond body -->
    <polygon points="32,10 50,32 32,54 14,32"/>
    <!-- Inner fold creases -->
    <line x1="32" y1="10" x2="32" y2="54"/>
    <line x1="14" y1="32" x2="50" y2="32"/>
    <!-- Wing extensions -->
    <line x1="32" y1="10" x2="10" y2="22"/>
    <line x1="32" y1="10" x2="54" y2="22"/>
  </g>
  <!-- Gold kintsugi accent dot -->
  <circle cx="32" cy="32" r="3" fill="#C9A84C"/>
</svg>